version: "3.9"

services:

  db:
    image: mysql:8.3
    container_name: sports_inventory_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootPass123
      MYSQL_DATABASE: sports_inventory
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootPass123"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: sports_inventory_app
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: sports_inventory
      DB_USER: root
      DB_PASSWORD: rootPass123
      JWT_SECRET: bXlTdXBlclNlY3JldEtleUZvckpXVEF1dGhlbnRpY2F0aW9uMTIzNDU2Nzg5MA==
      JWT_EXPIRATION: 86400000
      FILE_UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - file_uploads:/app/uploads

volumes:
  mysql_data:
  file_uploads:
